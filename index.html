<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Solari Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #2D327D;
      --charbg: #1E2260;
      --char:   #FFFFFF;
    }

    body {
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 48px 24px;
      font-family: 'Inter', sans-serif;
    }

    #board {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .row {
      display: flex;
      gap: 3px;
    }

    /* Wrap each tile in a perspective container so 3D transforms don't clip oddly */
    .tile-wrapper {
      perspective: 200px;
      perspective-origin: center center;
    }

    .tile {
      width: 48px;
      height: 64px;
      position: relative;
      background: var(--charbg);
      border-radius: 4px;
      overflow: hidden;
      transform-style: flat;
    }

    /* horizontal split gap — sits on top of everything */
    .tile::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: calc(50% - 1px);
      height: 2px;
      background: var(--bg);
      z-index: 20;
      pointer-events: none;
    }

    /* Each half is a 32px clipping window on the full 64px character */
    .tile-half {
      position: absolute;
      left: 0; right: 0;
      height: 32px;
      overflow: hidden;
      color: var(--char);
      font-size: 28px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      text-align: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    /* Top half: text rendered with line-height 64px so character centre = tile centre = bottom of this half */
    .tile-top {
      top: 0;
      line-height: 64px;
    }

    /* Bottom half: sits at tile midpoint, line-height 0 so text top aligns with split = lower half visible */
    .tile-bottom {
      top: 32px;
      line-height: 0px;
    }

    .tile-bottom span, .tile-half.tile-bottom {
      /* shift text up so it appears as lower continuation of tile-top */
    }

    /*
      Real Solari mechanic:
      - Top half of NEW char appears instantly (no animation)
      - Bottom half of OLD char rotates DOWN and away (flip-out)
      - Bottom half of NEW char rotates DOWN into place (flip-in)
      Both flip-out and flip-in pivot from the TOP edge of the bottom half.
    */
    .tile-flip-out {
      transform-origin: top center;
      animation: flip-out var(--flip-ms, 120ms) linear forwards;
    }

    .tile-flip-in {
      transform-origin: top center;
      animation: flip-in var(--flip-ms, 120ms) linear forwards;
    }

    @keyframes flip-out {
      from { transform: rotateX(0deg); }
      to   { transform: rotateX(90deg); }
    }

    @keyframes flip-in {
      from { transform: rotateX(-90deg); }
      to   { transform: rotateX(0deg); }
    }

    /* Mute button */
    #mute-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    #mute-btn:hover {
      background: rgba(255,255,255,0.28);
    }
  </style>
</head>
<body>
  <div id="board"></div>
  <button id="mute-btn" title="Toggle sound">
    <i class="bi bi-volume-mute-fill"></i>
  </button>
  <script>
    const CHAR_SET = ' ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789.,:/- ';
    const DEFAULTS = { background: '#2D327D', charbg: '#1E2260', char: '#FFFFFF', speed: 1, cols: 20, rows: 2 };

    function getParams() {
      const p = new URLSearchParams(location.search);
      const speed = parseFloat(p.get('speed'));
      const cols  = parseInt(p.get('cols'));
      const rows  = parseInt(p.get('rows'));
      const numRows = (Number.isInteger(rows) && rows > 0) ? rows : DEFAULTS.rows;
      const numCols = (Number.isInteger(cols) && cols > 0) ? cols : DEFAULTS.cols;
      const lines = [];
      for (let i = 1; i <= numRows; i++) {
        lines.push(normalise(p.get('line' + i) || '', numCols));
      }
      return {
        lines,
        cols:       numCols,
        rows:       numRows,
        background: validHex(p.get('background')) || DEFAULTS.background,
        charbg:     validHex(p.get('charbg'))     || DEFAULTS.charbg,
        char:       validHex(p.get('char'))        || DEFAULTS.char,
        speed:      (isFinite(speed) && speed > 0) ? speed : DEFAULTS.speed,
      };
    }

    function normalise(text, cols) {
      return text
        .toUpperCase()
        .split('')
        .map(c => CHAR_SET.includes(c) ? c : ' ')
        .slice(0, cols)
        .join('')
        .padEnd(cols, ' ');
    }

    function validHex(val) {
      if (!val) return null;
      const v = val.startsWith('#') ? val : '#' + val;
      return /^#[0-9A-Fa-f]{6}$/.test(v) ? v : null;
    }

    function applyColors(params) {
      const root = document.documentElement.style;
      root.setProperty('--bg',     params.background);
      root.setProperty('--charbg', params.charbg);
      root.setProperty('--char',   params.char);
    }

    // --- Audio ---
    let audioCtx = null;
    let muted = true;

    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playClick() {
      if (muted) return;
      const ctx = getAudioCtx();
      const bufferSize = ctx.sampleRate * 0.012; // 12ms of noise
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1);

      const source = ctx.createBufferSource();
      source.buffer = buffer;

      // Sharp attack, fast decay envelope
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.35, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.012);

      // High-pass to make it snappy, not bassy
      const filter = ctx.createBiquadFilter();
      filter.type = 'highpass';
      filter.frequency.value = 1200;

      source.connect(filter);
      filter.connect(gain);
      gain.connect(ctx.destination);
      source.start();
    }

    // Mute button toggle
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('mute-btn');
      const icon = btn.querySelector('i');

      btn.addEventListener('click', () => {
        muted = !muted;
        icon.className = muted ? 'bi bi-volume-mute-fill' : 'bi bi-volume-up-fill';
        // Resume AudioContext if suspended (browser autoplay policy)
        if (!muted) getAudioCtx().resume();
      });
    });

    // --- Tiles ---
    function createTile(char) {
      const wrapper = document.createElement('div');
      wrapper.className = 'tile-wrapper';

      const tile = document.createElement('div');
      tile.className = 'tile';

      const top = document.createElement('div');
      top.className = 'tile-top tile-half';
      top.textContent = char;

      const bot = document.createElement('div');
      bot.className = 'tile-bottom tile-half';
      bot.textContent = char;

      tile.appendChild(top);
      tile.appendChild(bot);
      wrapper.appendChild(tile);
      return { wrapper, tile, top, bot };
    }

    function buildRow(rowEl, text) {
      rowEl.innerHTML = '';
      const tiles = [];
      for (const char of text) {
        const t = createTile(' ');
        rowEl.appendChild(t.wrapper);
        tiles.push({ ...t, target: char, current: ' ' });
      }
      return tiles;
    }

    function getNextChar(current) {
      const idx = CHAR_SET.indexOf(current);
      return CHAR_SET[(idx + 1) % CHAR_SET.length];
    }

    function flipToNext(tileObj, flipMs) {
      return new Promise(resolve => {
        const next = getNextChar(tileObj.current);

        playClick();

        // Step 1: snap top half to new char immediately
        tileObj.top.textContent = next;

        // Step 2: old bottom flips away
        tileObj.bot.classList.add('tile-flip-out');
        tileObj.bot.style.setProperty('--flip-ms', flipMs + 'ms');

        // Step 3: new bottom half flips in
        const newBot = document.createElement('div');
        newBot.className = 'tile-bottom tile-half tile-flip-in';
        newBot.style.setProperty('--flip-ms', flipMs + 'ms');
        newBot.textContent = next;
        tileObj.tile.appendChild(newBot);

        setTimeout(() => {
          tileObj.bot.classList.remove('tile-flip-out');
          tileObj.bot.textContent = next;
          newBot.remove();
          tileObj.current = next;
          resolve();
        }, flipMs + 16);
      });
    }

    async function animateTile(tileObj, delay, speed) {
      await new Promise(r => setTimeout(r, delay));
      while (tileObj.current !== tileObj.target) {
        const flipMs = (80 + Math.random() * 60) / speed;
        await flipToNext(tileObj, flipMs);
      }
    }

    function startAnimation(allTiles, speed) {
      for (const t of allTiles) {
        const delay = Math.random() * 800 / speed;
        animateTile(t, delay, speed);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const params = getParams();
      applyColors(params);
      const board = document.getElementById('board');
      const allTiles = [];
      for (let i = 0; i < params.rows; i++) {
        const rowEl = document.createElement('div');
        rowEl.className = 'row';
        board.appendChild(rowEl);
        allTiles.push(...buildRow(rowEl, params.lines[i]));
      }
      startAnimation(allTiles, params.speed);
    });
  </script>
</body>
</html>
